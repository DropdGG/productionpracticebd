services:
  - type: web
    name: student-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: student-db
    plan: free 
